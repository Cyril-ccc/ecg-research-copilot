- id: G001
  category: electrolyte
  name: hyperkalemia_k55_default_window
  cohort_template: electrolyte_hyperkalemia
  params:
    k_threshold: 5.5
    label_keyword: potassium
    window_hours: 6
  expectations:
    cohort_subjects_min: 50
    cohort_subjects_max: 50000
    required_artifacts:
      - cohort.parquet
      - ecg_qc.parquet
      - ecg_features.parquet
      - report.md
    qc:
      pass_rate_min: 0.60
    features:
      mean_hr_min: 30
      mean_hr_max: 180
    report:
      must_have_sections:
        - Cohort definition
        - Data & QC
        - Results
        - Limitations
      must_mention:
        - missing
        - confounding

